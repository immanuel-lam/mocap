name: MocapCapture
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

targets:
  MocapCapture:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MocapCapture
    info:
      path: MocapCapture/Info.plist
      properties:
        CFBundleDisplayName: MocapCapture
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "Camera is used for ARKit world tracking to capture 6DoF pose."
        NSMotionUsageDescription: "Motion sensors capture 100 Hz IMU data for recording."
        NSLocalNetworkUsageDescription: "Local network is used to stream motion data to the viewer on your Mac."
        NSBonjourServices:
          - "_mocap._tcp"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MocapCapture
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: true
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
